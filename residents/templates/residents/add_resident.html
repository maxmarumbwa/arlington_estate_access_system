<!DOCTYPE html>
<html>
<head>
    <title>Add Resident</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5em; margin: 0.5em 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        form label { display: inline-block; width: 100px; }
        form input, form select { margin-bottom: 1em; }
        button { padding: 0.5em 1em; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Add New Resident</h1>
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Resident</button>
    </form>
    <p><a href="{% url 'residents:upload_residents_csv' %}">Or upload CSV instead</a></p>
    <p><a href="/admin/residents/resident/">Back to Admin</a></p>
</body>
</html>
