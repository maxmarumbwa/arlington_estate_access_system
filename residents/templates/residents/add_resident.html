{% extends "base.html" %}

{% block title %}Add Resident{% endblock %}

{% block content %}
<h1>Add New Resident</h1>

{% if messages %}
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<div class="card p-4 shadow-sm">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-success">Save Resident</button>
    </form>
</div>

<div class="mt-3">
    <a href="{% url 'residents:upload_residents_csv' %}">Upload CSV instead</a><br>
    <a href="/admin/residents/resident/">Back to Admin</a>
</div>
{% endblock %}
