<!DOCTYPE html>
<html>
<head><title>Request Access Code</title></head>
<body>
<h2>Request a Visitor Access Code</h2>
{% if messages %}
  <ul>{% for msg in messages %}<li>{{ msg }}</li>{% endfor %}</ul>
{% endif %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Request Code</button>
</form>
</body>
</html>
