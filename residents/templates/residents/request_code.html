{% extends "base.html" %}

{% block title %}Request Code{% endblock %}

{% block content %}
<h2>Request Visitor Access Code</h2>

{% if messages %}
    {% for msg in messages %}
        <div class="alert alert-info">{{ msg }}</div>
    {% endfor %}
{% endif %}

<div class="card p-4 shadow-sm">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary">Request Code</button>
    </form>
</div>
{% endblock %}
