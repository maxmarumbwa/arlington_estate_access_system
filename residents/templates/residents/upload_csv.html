<!DOCTYPE html>
<html>
<head>
    <title>Upload Residents CSV</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        .messages { list-style: none; padding: 0; }
        .messages li { padding: 0.5em; margin: 0.5em 0; }
        .success { background: #d4edda; color: #155724; }
        .warning { background: #fff3cd; color: #856404; }
        form { margin-top: 1em; }
        button { padding: 0.5em 1em; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Upload Residents from CSV</h1>
    <p>CSV must have header row: <strong>name, email, phone</strong></p>
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
    <p><a href="{% url 'residents:add_resident' %}">Add a single resident manually</a></p>
    <p><a href="/admin/residents/resident/">Back to Admin</a></p>
</body>
</html>
