 {% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Arlington Estate{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }

        /* Content expands */
        .content {
            flex: 1;
        }

        /* Footer */
        footer {
            background: #212529;
            color: white;
            padding: 15px 0;
        }

        footer a {
            color: #adb5bd;
            margin: 0 10px;
            text-decoration: none;
        }

        footer a:hover {
            color: white;
        }

        /* Mobile tweaks */
        @media (max-width: 576px) {
            h1, h2 {
                font-size: 1.4rem;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- ✅ HEADER -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="{% static 'images/logo.png' %}" alt="Logo">
            Arlington Estate
        </a>
    </div>
</nav>

<!-- ✅ PAGE CONTENT -->
<div class="content container mt-4">
    {% block content %}
    {% endblock %}
</div>

<!-- ✅ FOOTER -->
<footer class="text-center">
    <div class="container">
        <p class="mb-1">© 2026 Arlington Estate</p>
<div>
    <a href="https://www.linkedin.com/in/farai-maxwell-marumbwa-01328529/"><i class="fab fa-linkedin"></i> LinkedIn</a>
    <span><i class="fas fa-phone"></i> +263 784 701 494</span>
    <a href="https://github.com/maxmarumbwa"><i class="fab fa-github"></i> GitHub</a>
    <a href="mailto:maxmarumbwa@gmail.com"><i class="fas fa-envelope"></i> Email</a>
</div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
